<svg xmlns="http://www.w3.org/2000/svg" width="181" height="30"
     viewBox="0 0 181 30" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" role="img" aria-label="Esteban de la Sala">
  <style>
    .b { opacity: 0; animation: pop .5s ease-out forwards; animation-delay: 0.36s; }
